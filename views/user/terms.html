<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="i18n-title" content="terms.pageTitle">
    <title>Terms of Service - TaskMall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding-bottom: calc(32px + env(safe-area-inset-bottom, 0px)); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .content-area { line-height: 1.8; color: #374151; }
        .content-area h1 { font-size: 22px; font-weight: 700; margin: 20px 0 10px; color: #667eea; }
        .content-area h2 { font-size: 18px; font-weight: 600; margin: 16px 0 8px; color: #4a5568; }
        .content-area p { margin: 12px 0; }
        .content-area ul, .content-area ol { padding-left: 24px; margin: 12px 0; }
        .content-area li { margin: 6px 0; }
    </style>
  <script src="/public/js/common.js?v=8"></script>
</head>
<body class="flex flex-col min-h-screen">
    <div class="p-4 flex items-center text-white">
        <button onclick="history.back()" class="mr-4 hover:opacity-80 transition" aria-label="Back">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <h1 class="text-lg font-bold" data-i18n="terms.title">Terms of Service</h1>
        <div id="headerLangBtn" role="button" title="Language" aria-label="Select language" onclick="typeof showLanguage==='function'&&showLanguage();return false;" class="ml-auto w-9 h-9 flex items-center justify-center rounded-full cursor-pointer hover:opacity-90 transition" style="background:rgba(255,255,255,0.2);">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" class="w-5 h-5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </div>
    </div>

    <div class="flex-1 p-4">
        <div class="glass rounded-2xl p-6 shadow-2xl">
            <div class="text-center mb-6">
                <div class="text-5xl mb-3">📋</div>
                <h2 class="text-2xl font-bold text-gray-800" data-i18n="terms.title">Terms of Service</h2>
                <p class="text-sm text-gray-500 mt-2" data-i18n="terms.subtitle">User Agreement</p>
            </div>

            <div id="ruleContent" class="content-area"></div>
        </div>
    </div>

    <script>
        var DEFAULT_CONTENT = (typeof t === 'function' && t('terms.defaultHtml')) ? t('terms.defaultHtml') : '<h1>1. Acceptance</h1><p>By registering and using TaskMall, you agree to these Terms of Service. If you do not agree, please do not use our services.</p><h1>2. Account</h1><p>You must provide accurate information when registering. You are responsible for keeping your login credentials secure and for all activity under your account.</p><h1>3. Use of Service</h1><p>You agree to use the platform only for lawful purposes. Completing tasks, deposits, and withdrawals are subject to our rules and limits. We may suspend or terminate accounts that violate these terms.</p><h1>4. Changes</h1><p>We may update these terms from time to time. Continued use of the service after changes constitutes acceptance of the updated terms.</p><h1>5. Contact</h1><p>For questions about these terms, please contact our customer service.</p>';
        fetch('/api/config').then(function(r){ return r.json(); }).then(function(data){
            var el = document.getElementById('ruleContent');
            if (data.success && data.data && data.data.terms_content) { el.innerHTML = data.data.terms_content; }
            else { el.innerHTML = DEFAULT_CONTENT; }
        }).catch(function(){ document.getElementById('ruleContent').innerHTML = DEFAULT_CONTENT; });
    </script>
</body>
</html>
