<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="i18n-title" content="faq.pageTitle">
    <title>FAQ - TaskMall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh;
            padding-bottom: calc(32px + env(safe-area-inset-bottom, 0px));
        }
        .glass { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
        }
        .content-area {
            line-height: 1.8;
            color: #374151;
        }
        .content-area h1 { font-size: 24px; font-weight: 700; margin: 24px 0 12px; color: #667eea; }
        .content-area h2 { font-size: 20px; font-weight: 600; margin: 20px 0 10px; color: #764ba2; }
        .content-area h3 { font-size: 16px; font-weight: 700; margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 2px solid #e5e7eb; color: #1f2937; }
        .content-area p { margin: 0 0 16px; }
        .content-area .faq-q { font-weight: 600; color: #1f2937; margin: 18px 0 6px; }
        .content-area .faq-a { margin: 0 0 12px; padding-left: 0; color: #4b5563; }
        .content-area .faq-section { font-size: 16px; font-weight: 700; margin: 28px 0 14px; padding-bottom: 8px; border-bottom: 2px solid #e5e7eb; color: #1f2937; }
        .content-area .faq-section:first-child { margin-top: 0; }
        .content-area .faq-block { margin: 0 0 18px; line-height: 1.75; color: #4b5563; }
        .content-area ul, .content-area ol { padding-left: 24px; margin: 12px 0; }
        .content-area li { margin: 6px 0; }
        .content-area strong { color: #1f2937; font-weight: 600; }
        .content-area code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
    </style>
  <script src="/public/js/common.js?v=8"></script>
</head>
<body class="flex flex-col min-h-screen">
    <div class="p-4 flex items-center text-white">
        <button onclick="history.back()" class="mr-4 hover:opacity-80 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </button>
        <h1 class="text-lg font-bold" data-i18n="faq.title">FAQ</h1>
    </div>

    <div class="flex-1 p-4">
        <div class="glass rounded-2xl p-6 shadow-2xl">
            <div class="text-center mb-6">
                <div class="text-5xl mb-3">❓</div>
                <h2 class="text-2xl font-bold text-gray-800" data-i18n="faq.heroTitle">Frequently Asked Questions</h2>
                <p class="text-sm text-gray-500 mt-2" data-i18n="faq.heroSubtitle">Common Questions</p>
            </div>

            <div id="ruleContent" class="content-area">
                <div style="text-align: center; padding: 40px; color: #999;">
                    <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
                    <p data-i18n="common.loading">Loading...</p>
                </div>
            </div>
        </div>
    </div>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <script>
        // 将纯文本 FAQ 转为带分段、换行的 HTML，避免挤在一堆
        function formatFaqHtml(raw) {
            if (!raw || typeof raw !== 'string') return '';
            var s = raw.trim();
            if (!s) return '';
            // 若已是完整 HTML（含块级标签），直接返回
            if (/<div[\s>]|<p[\s>]|<h[1-6][\s>]/.test(s)) return s;
            // 纯文本：先按双换行分段，再在段内把单换行转为 <br>
            var paras = s.split(/\n\s*\n/);
            var out = [];
            for (var i = 0; i < paras.length; i++) {
                var block = paras[i].trim();
                if (!block) continue;
                var line = block.split(/\n/).map(function(l) { return l.trim(); }).join('<br>');
                line = line.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                var firstLine = block.split(/\n/)[0].trim();
                var isSection = block.indexOf('\n') === -1 && (
                    /^[IVXLCDM]+\.\s+.+$/i.test(firstLine) ||
                    /^[一二三四五六七八九十]+[\.\s]\s*.+$/.test(firstLine) ||
                    /^[0-9]+\.\s+[A-Z].+$/i.test(firstLine)
                );
                if (isSection) out.push('<h3 class="faq-section">' + firstLine.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</h3>');
                else out.push('<p class="faq-block">' + line + '</p>');
            }
            return out.join('');
        }

        fetch('/api/config')
            .then(res => res.json())
            .then(data => {
                const content = document.getElementById('ruleContent');
                if (data.success && data.data.faq) {
                    content.innerHTML = formatFaqHtml(data.data.faq);
                } else {
                    var title = (typeof t === 'function' ? (t('common.loadingContent') || 'Loading content...') : 'Loading content...');
                    var hint = (typeof t === 'function' ? (t('faq.contactSupport') || 'Contact online support if needed') : 'Contact online support if needed');
                    content.innerHTML = `
                        <div style="text-align: center; padding: 40px; color: #999;">
                            <p style="font-size: 48px;">📭</p>
                            <p>${title}</p>
                            <p style="font-size: 12px; margin-top: 10px;">${hint}</p>
                        </div>
                    `;
                }
            })
            .catch(err => {
                var fail = (typeof t === 'function' ? (t('common.failedToLoad') || 'Failed to load') : 'Failed to load');
                document.getElementById('ruleContent').innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #ff5858;">
                        <p>❌ ${fail}</p>
                    </div>
                `;
            });
    </script>
</body>
</html>
