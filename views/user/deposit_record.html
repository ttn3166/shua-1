<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#667eea">
  <title>Deposit Record - TaskMall</title>
  <link rel="stylesheet" href="/public/css/theme.css">
  <script src="/public/js/common.js"></script>
  <style>
    body {
      padding-bottom: calc(32px + env(safe-area-inset-bottom, 0px));
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .header-bar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .back-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      background: rgba(102, 126, 234, 0.1);
    }
    .back-btn:active { transform: scale(0.95); }
    .back-btn svg { width: 20px; height: 20px; color: #667eea; }
    .header-title { font-size: 18px; font-weight: 700; color: #1a202c; }
    .content-wrap { padding: 24px 20px; max-width: 520px; margin: 0 auto; }
    .record-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      border: 1px solid rgba(255, 255, 255, 0.8);
      position: relative;
      overflow: hidden;
    }
    .record-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: #cbd5e0;
    }
    .record-card[data-status="approved"]::before { background: linear-gradient(to bottom, #00c853, #00e676); }
    .record-card[data-status="pending"]::before { background: linear-gradient(to bottom, #f59e0b, #fbbf24); }
    .record-card[data-status="rejected"]::before { background: linear-gradient(to bottom, #e53e3e, #fc8181); }
    .record-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .record-row:last-child { margin-bottom: 0; }
    .record-label { font-size: 13px; color: #718096; }
    .record-value { font-size: 14px; font-weight: 600; color: #1a202c; }
    .record-amount { font-size: 18px; font-weight: 700; color: #667eea; }
    .record-status {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      text-transform: capitalize;
    }
    .record-status.pending { background: rgba(245, 158, 11, 0.15); color: #d97706; }
    .record-status.approved { background: rgba(0, 200, 83, 0.15); color: #059669; }
    .record-status.rejected { background: rgba(229, 62, 62, 0.15); color: #dc2626; }
    .record-hash { font-family: monospace; font-size: 11px; word-break: break-all; color: #4a5568; }
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: rgba(255,255,255,0.9);
      font-size: 15px;
    }
    .empty-state .empty-icon { margin-bottom: 12px; opacity: 0.9; }
    .empty-state .empty-icon svg { width: 64px; height: 64px; stroke: rgba(255,255,255,0.9); }
    .record-loading { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 24px; color: rgba(255,255,255,0.8); }
    .record-loading .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .load-more {
      display: block;
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      background: rgba(255,255,255,0.2);
      color: white;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .load-more:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <header class="header-bar">
    <a href="javascript:history.back()" class="back-btn" aria-label="Back">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </a>
    <h1 class="header-title">Deposit Record</h1>
  </header>

  <main class="content-wrap">
    <div id="recordList"></div>
    <div id="emptyState" class="empty-state" style="display:none;">
      <div class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg></div>
      <span class="empty-text">No deposit records yet.</span>
    </div>
    <button type="button" id="loadMoreBtn" class="load-more" style="display:none;">Load More</button>
  </main>

  <script>
    (function() {
      var token = localStorage.getItem('token');
      if (!token) {
        window.location.replace('/views/user/index.html');
        return;
      }

      var page = 1;
      var limit = 20;
      var totalPages = 1;

      function statusText(s) {
        if (s === 'approved') return 'Approved';
        if (s === 'rejected') return 'Rejected';
        return 'Pending';
      }

      function formatDate(str) {
        if (!str) return '-';
        var d = new Date(str);
        if (isNaN(d.getTime())) return str;
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0') + ' ' +
          String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
      }

      function renderRecord(d) {
        var status = (d.status || 'pending').toLowerCase();
        var hashHtml = d.hash ? '<div class="record-row"><span class="record-label">Tx Hash</span><span class="record-value record-hash">' + (d.hash.length > 12 ? d.hash.slice(0, 8) + '...' + d.hash.slice(-8) : d.hash) + '</span></div>' : '';
        return '<div class="record-card" data-status="' + status + '">' +
          '<div class="record-row"><span class="record-label">Amount</span><span class="record-value record-amount">' + Number(d.amount).toFixed(2) + ' USDT</span></div>' +
          '<div class="record-row"><span class="record-label">Status</span><span class="record-status ' + status + '">' + statusText(status) + '</span></div>' +
          '<div class="record-row"><span class="record-label">Time</span><span class="record-value">' + formatDate(d.created_at) + '</span></div>' +
          hashHtml +
          (d.note ? '<div class="record-row"><span class="record-label">Note</span><span class="record-value">' + (d.note.length > 30 ? d.note.slice(0, 30) + '...' : d.note) + '</span></div>' : '') +
          '</div>';
      }

      function loadDeposits(append) {
        var listEl = document.getElementById('recordList');
        var emptyEl = document.getElementById('emptyState');
        var btnEl = document.getElementById('loadMoreBtn');
        if (!append) {
          listEl.innerHTML = '<div class="record-loading"><div class="spinner"></div><span>Loading...</span></div>';
          emptyEl.style.display = 'none';
          btnEl.style.display = 'none';
        }

        fetch('/api/finance/deposits?page=' + page + '&limit=' + limit, {
          headers: { 'Authorization': 'Bearer ' + token }
        })
          .then(function(r) { return r.json(); })
          .then(function(res) {
            if (!res.success || !res.data) {
              if (!append) {
                listEl.innerHTML = '';
                emptyEl.querySelector('.empty-text').textContent = 'Failed to load records.';
                emptyEl.style.display = 'block';
              }
              return;
            }
            var deposits = res.data.deposits || [];
            var pagination = res.data.pagination || {};
            totalPages = pagination.pages || 1;

            if (!append) listEl.innerHTML = '';
            deposits.forEach(function(d) {
              listEl.insertAdjacentHTML('beforeend', renderRecord(d));
            });

            if (!append && deposits.length === 0) {
              emptyEl.querySelector('.empty-text').textContent = 'No deposit records yet.';
              emptyEl.style.display = 'block';
            } else {
              emptyEl.style.display = 'none';
            }

            if (page < totalPages) {
              btnEl.style.display = 'block';
              btnEl.textContent = 'Load More';
            } else {
              btnEl.style.display = deposits.length === 0 ? 'none' : (page > 1 ? 'block' : 'none');
              if (page >= totalPages && deposits.length > 0) btnEl.textContent = 'No more';
            }
          })
          .catch(function() {
            if (!append) {
              listEl.innerHTML = '';
              emptyEl.querySelector('.empty-text').textContent = 'Network error. Please try again.';
              emptyEl.style.display = 'block';
            }
          });
      }

      document.getElementById('loadMoreBtn').addEventListener('click', function() {
        if (page >= totalPages) return;
        page++;
        loadDeposits(true);
      });

      loadDeposits(false);
      var langBtn = document.getElementById('headerLangBtn');
      if (langBtn && typeof window.showLanguage === 'function') langBtn.addEventListener('click', function () { window.showLanguage(); });
    })();
  </script>
</body>
</html>
