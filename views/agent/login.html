<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#050712">
  <title>代理后台 - 登录</title>
  <link rel="stylesheet" href="/public/css/theme.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .agent-login-container {
      width: 100%;
      max-width: 440px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: linear-gradient(145deg, var(--gold-strong), var(--gold-primary));
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 900;
      color: var(--text-dark);
      box-shadow: var(--shadow-gold);
    }

    .login-title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--gold-strong), var(--gold-primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-subtitle {
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
    }

    .welcome-notice {
      padding: 12px 16px;
      background: var(--gold-soft);
      border: 1px solid var(--border-gold);
      border-radius: var(--radius-md);
      margin-bottom: 24px;
      font-size: 13px;
      color: var(--gold-strong);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }

    .form-footer a {
      color: var(--gold-primary);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="agent-login-container">
    <!-- 登录表单卡片 -->
    <div class="card-elevated">
      <div class="login-header">
        <div class="logo">💎</div>
        <h1 class="login-title">代理后台</h1>
        <p class="login-subtitle">代理中心登录</p>
      </div>

      <!-- 欢迎提示 -->
      <div class="welcome-notice">
        <span>👋</span>
        <span>欢迎回来，登录后可查看团队数据与佣金。</span>
      </div>

      <!-- 错误提示 -->
      <div id="error-alert" class="alert alert-error" style="display: none;"></div>

      <!-- 表单 -->
      <form id="agentLoginForm">
        <div class="form-group">
          <label class="form-label" for="username">代理账号</label>
          <input 
            type="text" 
            id="username" 
            class="form-input" 
            placeholder="请输入代理用户名"
            required
            autocomplete="username"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">密码</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="请输入密码"
            required
            autocomplete="current-password"
          >
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
          <span id="btnText">登录代理工作台</span>
          <span id="btnLoading" class="loading" style="display: none;"></span>
        </button>
      </form>

      <!-- 底部提示 -->
      <div class="form-footer">
        还没有代理账号？<a href="#" onclick="alert('请联系管理员申请成为代理'); return false;">申请成为代理</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('agentLoginForm');
    const errorAlert = document.getElementById('error-alert');
    const loginBtn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');
    const btnLoading = document.getElementById('btnLoading');

    // 显示错误
    function showError(message) {
      errorAlert.textContent = message;
      errorAlert.style.display = 'flex';
    }

    // 隐藏错误
    function hideError() {
      errorAlert.style.display = 'none';
    }

    // 设置加载状态
    function setLoading(loading) {
      loginBtn.disabled = loading;
      if (loading) {
        btnText.style.display = 'none';
        btnLoading.style.display = 'inline-block';
      } else {
        btnText.style.display = 'inline';
        btnLoading.style.display = 'none';
      }
    }

    // 表单提交
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('请输入用户名和密码');
        return;
      }

      setLoading(true);

      try {
        const response = await fetch('/api/auth/agent/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const result = await response.json();

        if (!response.ok || !result.success) {
          throw new Error(result.error || '登录失败');
        }

        // 验证角色权限
        if (result.data.user.role !== 'Agent') {
          throw new Error('仅限代理账号登录');
        }

        // 保存 Token（双写便于 enter/dashboard 读取）
        const token = result.data.token;
        localStorage.setItem('agent_token', token);
        sessionStorage.setItem('agent_token', token);
        localStorage.setItem('agent_user', JSON.stringify(result.data.user));

        // 经 enter 页注入 token 后跳转 dashboard，避免时序问题
        window.location.replace('/views/agent/enter.html#' + encodeURIComponent(token));
      } catch (error) {
        showError(error.message);
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
